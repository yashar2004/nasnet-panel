name: Setup Go Backend
description: Set up Go with the backend module defaults.

inputs:
  go-version-file:
    description: Path to the Go module file
    required: false
    default: apps/backend/go.mod
  cache-dependency-path:
    description: Path to the Go checksum file
    required: false
    default: apps/backend/go.sum

runs:
  using: composite
  steps:
    - uses: actions/setup-go@v6
      with:
        go-version-file: ${{ inputs.go-version-file }}
        cache-dependency-path: ${{ inputs.cache-dependency-path }}
